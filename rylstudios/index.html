<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYL Studios | Atlanta Headshot & Editorial Photographer</title>
    
    <link rel="icon" type="image/jpeg" href="images/logo-bw.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@200;400&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .accent-gold { color: #d4af37; }
        .nav-blur { backdrop-filter: blur(15px); background: rgba(10, 10, 10, 0.85); }

        /* LOGO STACK */
        .logo-wrapper { position: relative; width: 220px; height: 90px; }
        .logo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; animation: logoStack 16s infinite; }
        .logo-wrapper img:nth-child(1) { animation-delay: 0s; }
        .logo-wrapper img:nth-child(2) { animation-delay: 4s; }
        .logo-wrapper img:nth-child(3) { animation-delay: 8s; }
        .logo-wrapper img:nth-child(4) { animation-delay: 12s; }
        @keyframes logoStack { 0%, 5% { opacity: 0; } 10%, 25% { opacity: 1; } 30%, 100% { opacity: 0; } }
        
        /* GALLERY STYLING */
        .portfolio-container { position: relative; overflow: hidden; background-color: #111; height: 100%; cursor: zoom-in; }
        .portfolio-img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(50%);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group:hover .portfolio-img {
            filter: grayscale(0%) brightness(100%);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #gallery-grid { grid-template-columns: 1fr !important; grid-auto-rows: 500px !important; }
        }

        /* PhotoSwipe Custom Dark Mode */
        .pswp { --pswp-bg: #0a0a0a; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <nav class="fixed w-full z-50 nav-blur border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <a href="#" class="logo-wrapper">
                <img src="images/logo-color.png" alt="Logo 1">
                <img src="images/logo-bw.png" alt="Logo 2">
                <img src="images/logo-bw2.png" alt="Logo 3">
                <img src="images/logo-bw3.png" alt="Logo 4">
            </a>
            <div class="flex space-x-12 text-[10px] uppercase tracking-[0.4em] font-light text-white/70">
                <a href="#work" class="hover:text-amber-500 transition text-white">Portfolio</a>
                <a href="https://rylstudios.shootproof.com" target="_blank" class="hover:text-amber-500 transition text-white">Archives</a>
                <a href="mailto:design@rylstudio.com" class="hover:text-amber-500 transition font-medium text-white">Inquire</a>
            </div>
            <a href="mailto:design@rylstudio.com" class="hidden md:block text-[10px] border border-white/20 px-8 py-2 hover:bg-white hover:text-black transition uppercase tracking-widest">Book Now</a>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative bg-[#0a0a0a]">
        <div class="relative z-10 text-center px-6 max-w-5xl" data-aos="fade-up">
            <span class="accent-gold uppercase tracking-[1em] text-[10px] mb-6 block">Atlanta Photography Studio</span>
            <h1 class="text-5xl md:text-8xl mb-8 italic font-black text-white leading-tight">Capturing the<br>Unseen Moment.</h1>
        </div>
    </section>

    <section id="work" class="pb-40 px-6">
        <div class="max-w-7xl mx-auto">
            <div id="gallery-grid" class="pswp-gallery grid grid-cols-1 md:grid-cols-4 gap-4 auto-rows-[450px]"></div>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5 text-center text-gray-700">
        <a href="mailto:design@rylstudio.com" class="text-[10px] border border-white/20 px-12 py-4 hover:bg-white hover:text-black transition uppercase tracking-[0.5em]">Start Your Project</a>
        <p class="mt-12 text-[9px] uppercase tracking-[0.6em]">&copy; 2026 RYL Studios | Atlanta</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ once: true, duration: 1000 });
            
            let portfolio = [
                'img-10.jpg', 'img-8.jpg', 'img-9.jpg', 'img-7.jpg', 
                'img-6.jpg', 'img-4.jpg', 'img-5.jpg', 'img-2.jpg', 
                'img-3.jpg', 'img1.jpg', 'img2.jpg', 'img3.jpg', 
                'img4.jpg', 'img5.jpg', 'img6.jpg', 'img7.jpg', 'IMG_6760.jpeg'
            ];

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            portfolio = shuffle(portfolio);
            const folder = 'portfolio/'; 
            const gallery = document.getElementById('gallery-grid');

            if (gallery) {
                portfolio.forEach((file, index) => {
                    const isLarge = (index % 6 === 0) ? 'md:col-span-2 md:row-span-2' : '';
                    
                    // Smart Alignment Fixes
                    let alignStyle = 'object-position: center 15%;';
                    if (file === 'img3.jpg') alignStyle = 'object-position: 80% center;';
                    if (file === 'img5.jpg') alignStyle = 'object-position: 20% center;';

                    // Using 2400x3000 as a standard high-res placeholder for the lightbox
                    gallery.innerHTML += `
                        <a href="${folder}${file}" 
                           data-pswp-width="2400" 
                           data-pswp-height="3000" 
                           target="_blank" 
                           class="${isLarge} portfolio-container group block" data-aos="fade-up">
                            <img src="${folder}${file}" alt="RYL Portrait" loading="lazy" 
                                 class="portfolio-img" style="${alignStyle}">
                        </a>`;
                });
            }

            // Initialize Lightbox
            const lightbox = new PhotoSwipeLightbox({
                gallery: '#gallery-grid',
                children: 'a',
                pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
            });
            lightbox.init();
        });
    </script>
</body>
</html>
